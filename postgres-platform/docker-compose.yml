services:
  postgres:
    image: postgres:16-alpine
    container_name: aimed-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: aimed
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d aimed"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - aimed-postgres-data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro

volumes:
  aimed-postgres-data:
